<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Путь к мечте</title>

<link rel="manifest" href="manifest.json">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1B6B3A;--green-lt:#E8F5E9;--green-md:#43A047;
  --red:#7B1A1A;--red-lt:#FFEBEE;
  --yellow:#BF360C;--yellow-lt:#FFF3E0;
  --blue:#0D47A1;--blue-lt:#E3F2FD;
  --purple:#4A148C;--purple-lt:#F3E5F5;
  --orange:#E65100;--orange-lt:#FBE9E7;
  --bg:#FFFFFF;--bg2:#F5F5F5;--bg3:#EEEEEE;
  --text:#1A1A1A;--text2:#757575;--text3:#BDBDBD;
  --border:#E0E0E0;
  --r:12px;--r2:8px
}

html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2)}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg2);position:relative}

.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 16px 0;padding-top:calc(env(safe-area-inset-top,12px) + 12px);padding-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-l .t1{font-size:16px;font-weight:600;color:var(--text)}
.topbar-l .t2{font-size:12px;color:var(--text2);margin-top:1px}
.topbar-r{font-size:12px;color:var(--text2);text-align:right;line-height:1.5}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:10px}

.nav{background:var(--bg);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:calc(env(safe-area-inset-bottom,0) + 10px)}
.nav-btn{flex:1;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:9px;font-family:inherit;transition:color .15s}
.nav-btn.active{color:var(--green)}

.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.card.green{background:var(--green-lt);border-color:var(--green-md)}
.card.dream{background:linear-gradient(135deg,#0D47A1 0%,#1565C0 100%);border:none}
.lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.lbl.w{color:rgba(255,255,255,.75)}
.big{font-size:28px;font-weight:700;color:var(--green);line-height:1.1}
.big.w{color:#fff}
.sub{font-size:12px;color:var(--text2);margin-top:4px}
.sub.w{color:rgba(255,255,255,.7)}
.sec{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;padding-top:2px}

.tlist{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)}
.trow:last-child{border-bottom:none}
.trow-l{font-size:14px;color:var(--text);display:flex;align-items:center;gap:10px}
.tico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.trow-r{font-size:14px;font-weight:600}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.met{background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px}
.met-l{font-size:11px;color:var(--text2);margin-bottom:4px}
.met-v{font-size:16px;font-weight:600;color:var(--text)}

.status{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stxt{font-size:14px;font-weight:600}

.prog-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;flex-direction:column;gap:16px}
.pi-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pi-name{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.pi-pct{font-size:12px;font-weight:600}
.pbar{height:7px;border-radius:4px;overflow:hidden;margin-bottom:5px}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.pi-meta{display:flex;justify-content:space-between}
.pi-meta span{font-size:11px;color:var(--text2)}

.add-btn{background:var(--green);color:#fff;border:none;border-radius:var(--r);padding:15px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:inherit;transition:opacity .15s;-webkit-appearance:none}
.add-btn:active{opacity:.85}
.add-btn.sec2{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.save-btn{background:var(--green);color:#fff;border:none;border-radius:var(--r);padding:16px;font-size:16px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;-webkit-appearance:none;transition:opacity .15s}
.save-btn:active{opacity:.85}

.fhd{display:flex;align-items:center;gap:10px;padding:14px 0 6px}
.fhd h2{font-size:18px;font-weight:600;color:var(--text)}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;padding:4px;border-radius:var(--r2)}
.fgrp{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.frow{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.frow-l{font-size:14px;color:var(--text2);flex:1;display:flex;align-items:center;gap:8px}
.finp{background:none;border:none;outline:none;font-size:16px;font-weight:600;color:var(--text);width:130px;text-align:right;font-family:inherit;-webkit-appearance:none}
.finp[type=date]{font-size:14px;font-weight:400;color:var(--text)}
.finp[type=text]{width:160px;font-weight:400;font-size:14px}
.finp::placeholder{color:var(--text3);font-weight:400}
.fsuf{font-size:14px;color:var(--text2);margin-left:3px}
.fsel{background:none;border:none;outline:none;font-size:14px;font-weight:600;color:var(--green);text-align:right;font-family:inherit;-webkit-appearance:none;cursor:pointer;max-width:180px}
.prev{background:var(--green-lt);border:1px solid var(--green-md);border-radius:var(--r);padding:13px 16px;margin-bottom:10px}
.prev-t{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.prev-row{display:flex;justify-content:space-between;margin-bottom:5px}
.prev-row:last-child{margin-bottom:0}
.prev-row span:first-child{font-size:13px;color:var(--text2)}
.prev-row span:last-child{font-size:13px;font-weight:600;color:var(--green)}

.hcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:8px}
.hcard.expense{border-left:3px solid var(--orange)}
.hcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hcard-date{font-size:14px;font-weight:600;color:var(--text)}
.hcard-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--orange-lt);color:var(--orange)}
.hcard-mine{font-size:15px;font-weight:700;color:var(--green)}
.hcard-mine.exp{color:var(--orange)}
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px}
.hgrid span{font-size:12px;color:var(--text2)}
.hgrid span b{color:var(--text);font-weight:600}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex;align-items:center;border-radius:6px;transition:color .15s}
.del-btn:active{color:var(--red)}

.sgrp{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.srow{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.srow-l{font-size:14px;color:var(--text);flex:1}
.srow-l small{display:block;font-size:11px;color:var(--text2);margin-top:1px}
.sinp{background:none;border:none;outline:none;font-size:15px;font-weight:600;color:var(--green);width:110px;text-align:right;font-family:inherit;-webkit-appearance:none}
.sinp::placeholder{color:var(--text3)}
.ssuf{font-size:13px;color:var(--text2);margin-left:2px}
.save-cfg-btn{background:var(--green);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;-webkit-appearance:none}

.stat-nav{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px}
.stat-nav button{background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;padding:0 4px;line-height:1;font-family:inherit}
.stat-nav span{font-size:15px;font-weight:600;color:var(--text)}
.stat-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:13px;color:var(--text2)}
.stat-val{font-size:14px;font-weight:600;color:var(--text)}
.stat-val.g{color:var(--green)}
.stat-val.o{color:var(--orange)}
.stat-val.r{color:var(--red)}
.rec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.rec-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px}
.rec-v{font-size:17px;font-weight:700;color:var(--text);line-height:1.2}
.rec-l{font-size:10px;color:var(--text2);margin-top:3px}

.choice-wrap{display:flex;flex-direction:column;gap:10px;padding-top:8px}
.choice-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;font-family:inherit;text-align:left;-webkit-appearance:none;transition:border-color .15s}
.choice-btn:active{border-color:var(--green)}
.choice-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.choice-t{font-size:15px;font-weight:600;color:var(--text)}
.choice-s{font-size:12px;color:var(--text2);margin-top:2px}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(0,0,0,.82);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;backdrop-filter:blur(8px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:48px 0;color:var(--text2);font-size:14px}
</style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231B6B3A'/><circle cx='50' cy='50' r='16' fill='%23fff'/><circle cx='50' cy='50' r='8' fill='%231B6B3A'/><line x1='50' y1='5' x2='50' y2='30' stroke='%23fff' stroke-width='5' stroke-linecap='round'/><line x1='50' y1='70' x2='50' y2='95' stroke='%23fff' stroke-width='5' stroke-linecap='round'/><line x1='5' y1='50' x2='30' y2='50' stroke='%23fff' stroke-width='5' stroke-linecap='round'/><line x1='70' y1='50' x2='95' y2='50' stroke='%23fff' stroke-width='5' stroke-linecap='round'/></svg>">
<style>
.ico{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}
.ico svg{width:1em;height:1em;stroke:currentColor}
.nav-btn .ico svg{width:22px;height:22px}
.tico .ico svg{width:14px;height:14px}
.back-btn .ico svg{width:24px;height:24px}
.add-btn .ico svg{width:18px;height:18px}
.save-btn .ico svg{width:18px;height:18px}
.frow-l .ico svg{width:17px;height:17px}
.pi-name .ico svg{width:15px;height:15px}
.trow-l .ico svg{width:14px;height:14px}
.choice-ico .ico svg{width:22px;height:22px}
.empty .ico svg{width:40px;height:40px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-l">
      <div class="t1"><span class="ico" style="font-size:15px;vertical-align:-1px;margin-right:5px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2 -5h9l4 4h1a2 2 0 0 1 2 2v5h-2m-4 0h-6m-6 -6h15m-6 0v-5"/></svg></span>Путь к мечте</div>
      <div class="t2">Коплю на машину</div>
    </div>
    <div class="topbar-r" id="top-date"></div>
  </div>
  <div class="content" id="content"></div>
  <div class="nav">
    <button class="nav-btn active" id="nb-dash" onclick="go('dash')"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg></span>Главная</button>
    <button class="nav-btn" id="nb-history" onclick="go('history')"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l11 0"/><path d="M9 12l11 0"/><path d="M9 18l11 0"/><path d="M5 6l0 .01"/><path d="M5 12l0 .01"/><path d="M5 18l0 .01"/></svg></span>История</button>
    <button class="nav-btn" id="nb-add" onclick="go('add')"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg></span>Добавить</button>
    <button class="nav-btn" id="nb-stats" onclick="go('stats')"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v5a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"/><path d="M9 8m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v9a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"/><path d="M15 4m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v13a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"/></svg></span>Статистика</button>
    <button class="nav-btn" id="nb-settings" onclick="go('settings')"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z"/><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"/></svg></span>Настройки</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DEF_CFG={debtMom:130000,goalMonth:150000,planShifts:25,pctMom:0,pctRepair:20,pctPillow:10,pctCar:0,goalRepair:50000,goalPillow:100000,goalCar:1000000,initRepair:0,initPillow:0,initCar:0,initMom:0};
let CFG=Object.assign({},DEF_CFG);

function loadCfg(){try{const c=JSON.parse(localStorage.getItem('cfg')||'{}');CFG=Object.assign({},DEF_CFG,c);}catch(e){CFG=Object.assign({},DEF_CFG);}}
function saveCfg(){localStorage.setItem('cfg',JSON.stringify(CFG));}
function loadShifts(){try{return JSON.parse(localStorage.getItem('shifts')||'[]');}catch(e){return[];}}
function saveShifts(s){localStorage.setItem('shifts',JSON.stringify(s));}
function loadFundExpenses(){try{return JSON.parse(localStorage.getItem('fundExpenses')||'[]');}catch(e){return[];}}
function saveFundExpenses(e){localStorage.setItem('fundExpenses',JSON.stringify(e));}
function loadFundDeposits(){try{return JSON.parse(localStorage.getItem('fundDeposits')||'[]');}catch(e){return[];}}
function saveFundDeposits(d){localStorage.setItem('fundDeposits',JSON.stringify(d));}

function calc(g,fu,fo){
  const n=g-fu-fo;
  const mo=Math.round(n*(CFG.pctMom||0)/100);
  const rp=Math.round(n*CFG.pctRepair/100);
  const pi=Math.round(n*CFG.pctPillow/100);
  const ca=Math.round(n*CFG.pctCar/100);
  return{net:n,mom:mo,repair:rp,pillow:pi,car:ca,mine:n-mo-rp-pi-ca};
}
function fmt(n){return Math.round(n).toLocaleString('ru-RU')+' ₽';}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',weekday:'short'});}
function fundName(f){return f==='mom'?'Долг маме':f==='repair'?'Ремонтный фонд':f==='pillow'?'Подушка':f==='car'?'На машину':f;}
function fundColor(f){return f==='mom'?'var(--red)':f==='repair'?'var(--yellow)':f==='pillow'?'var(--blue)':f==='car'?'var(--purple)':'var(--text)';}
function fundBg(f){return f==='mom'?'var(--red-lt)':f==='repair'?'var(--yellow-lt)':f==='pillow'?'var(--blue-lt)':f==='car'?'var(--purple-lt)':'var(--bg3)';}
function pluralM(n){if(n%10===1&&n%100!==11)return'месяц';if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100))return'месяца';return'месяцев';}

let cur='dash';
let statYear=new Date().getFullYear();
let statMonth=new Date().getMonth();
loadCfg();

function go(tab){
  cur=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map={dash:'nb-dash',history:'nb-history',add:'nb-add','add-shift':'nb-add','add-expense':'nb-add','add-deposit':'nb-add',stats:'nb-stats',settings:'nb-settings'};
  const nb=document.getElementById(map[tab]);
  if(nb)nb.classList.add('active');
  render();
}

function render(){
  const now=new Date();
  document.getElementById('top-date').innerHTML=now.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+'<br>'+now.toLocaleDateString('ru-RU',{weekday:'short'});
  const c=document.getElementById('content');
  c.innerHTML='';
  if(cur==='dash')renderDash(c);
  else if(cur==='history')renderHistory(c);
  else if(cur==='add')renderAdd(c);
  else if(cur==='add-shift')renderAddShift(c);
  else if(cur==='add-expense')renderAddExpense(c);
  else if(cur==='add-deposit')renderAddDeposit(c);
  else if(cur==='stats')renderStats(c);
  else if(cur==='settings')renderSettings(c);
}

function getDreamDate(shifts,fundExpenses){
  if(!CFG.goalCar||CFG.goalCar<=0)return null;
  const totalCarSaved=shifts.reduce((a,s)=>a+(s.car||0),0);
  const totalCarSpent=fundExpenses.filter(e=>e.fund==='car').reduce((a,e)=>a+e.amount,0);
  const carBalance=(CFG.initCar||0)+totalCarSaved-totalCarSpent;
  const remaining=CFG.goalCar-carBalance;
  if(remaining<=0)return{done:true};
  const monthData={};
  shifts.forEach(s=>{const ym=s.date.slice(0,7);if(!monthData[ym])monthData[ym]=0;monthData[ym]+=(s.car||0);});
  const months=Object.values(monthData);
  if(!months.length)return null;
  const recent=months.slice(-3);
  const avg=recent.reduce((a,b)=>a+b,0)/recent.length;
  if(avg<=0)return null;
  const mLeft=Math.ceil(remaining/avg);
  const now=new Date();
  const target=new Date(now.getFullYear(),now.getMonth()+mLeft,1);
  const mn=['январе','феврале','марте','апреле','мае','июне','июле','августе','сентябре','октябре','ноябре','декабре'];
  return{done:false,monthsLeft:mLeft,label:'в '+mn[target.getMonth()]+' '+target.getFullYear()};
}

function renderDash(c){
  const shifts=loadShifts();
  const fundExpenses=loadFundExpenses();
  const last=shifts[shifts.length-1];
  const now=new Date();
  const ym=now.toISOString().slice(0,7);
  const thisMonth=shifts.filter(s=>s.date&&s.date.slice(0,7)===ym);
  const worked=thisMonth.length;
  const monthNet=thisMonth.reduce((a,s)=>a+calc(s.gross,s.fuel,s.food).net,0);
  const goalPct=CFG.goalMonth>0?Math.round(monthNet/CFG.goalMonth*100):0;

  const fundDeposits=loadFundDeposits();
  const totalMomAcc=(CFG.initMom||0)+shifts.reduce((a,s)=>a+(s.mom||0),0)+fundDeposits.filter(d=>d.fund==='mom').reduce((a,d)=>a+d.amount,0);
  const momSpent=fundExpenses.filter(e=>e.fund==='mom').reduce((a,e)=>a+e.amount,0);
  const totalPaid=totalMomAcc-momSpent;
  const totalRepairAcc=shifts.reduce((a,s)=>a+(s.repair||0),0);
  const totalPillowAcc=shifts.reduce((a,s)=>a+(s.pillow||0),0);
  const totalCarAcc=shifts.reduce((a,s)=>a+(s.car||0),0);
  const repairSpent=fundExpenses.filter(e=>e.fund==='repair').reduce((a,e)=>a+e.amount,0);
  const pillowSpent=fundExpenses.filter(e=>e.fund==='pillow').reduce((a,e)=>a+e.amount,0);
  const carSpent=fundExpenses.filter(e=>e.fund==='car').reduce((a,e)=>a+e.amount,0);
  const repairDep=fundDeposits.filter(d=>d.fund==='repair').reduce((a,d)=>a+d.amount,0);
  const pillowDep=fundDeposits.filter(d=>d.fund==='pillow').reduce((a,d)=>a+d.amount,0);
  const carDep=fundDeposits.filter(d=>d.fund==='car').reduce((a,d)=>a+d.amount,0);
  const totalRepair=(CFG.initRepair||0)+totalRepairAcc+repairDep-repairSpent;
  const totalPillow=(CFG.initPillow||0)+totalPillowAcc+pillowDep-pillowSpent;
  const totalCar=(CFG.initCar||0)+totalCarAcc+carDep-carSpent;
  const avgNet=shifts.length>0?shifts.reduce((a,s)=>a+calc(s.gross,s.fuel,s.food).net,0)/shifts.length:0;

  const dream=getDreamDate(shifts,fundExpenses);

  let mineVal='—',mineSub='Добавь первую смену';
  let transfers=[];
  if(last){
    const lastNet=last.net||(last.gross-last.fuel-last.food);
    const lastMine=lastNet-(last.mom||0)-(last.repair||0)-(last.pillow||0)-(last.car||0);
    mineVal=fmt(lastMine);
    mineSub='Смена '+fmtD(last.date);
    transfers=[
      {icon:'ti-tool',l:'Ремонт. фонд',v:last.repair||0,bg:'var(--yellow-lt)',c:'#BF360C'},
      {icon:'ti-heart',l:'Маме',v:last.mom||0,bg:'var(--red-lt)',c:'var(--red)'},
      {icon:'ti-building-bank',l:'Подушка безопасности',v:last.pillow||0,bg:'var(--blue-lt)',c:'var(--blue)'},
      {icon:'ti-car',l:'Новая машина',v:last.car||0,bg:'var(--purple-lt)',c:'var(--purple)'},
      {icon:'ti-wallet',l:'Себе',v:lastMine,bg:'var(--green-lt)',c:'var(--green)'},
    ];
  }

  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysElapsed=now.getDate();
  const daysLeft=daysInMonth-now.getDate()+1;
  const avgPerDay=daysElapsed>0?Math.round(monthNet/daysElapsed):0;
  const projectedMonth=avgPerDay*daysInMonth;
  const avgDayColor=projectedMonth>=CFG.goalMonth?'var(--green)':projectedMonth>=CFG.goalMonth*0.7?'#E65100':'var(--red)';
  const shiftsLeft=CFG.planShifts-worked;
  let sc,st,emoji;
  if(shiftsLeft<=0){sc='var(--green)';st='План выполнен!';emoji='🟢';}
  else if(shiftsLeft<daysLeft*.6){sc='var(--green)';st='Можно не работать';emoji='🟢';}
  else if(shiftsLeft<=daysLeft){sc='#E65100';st='Работаем по плану';emoji='🟡';}
  else{sc='var(--red)';st='Лучше выйти на линию';emoji='🔴';}

  const goals=[
    {name:'Долг маме',icon:'ti-heart',acc:totalPaid,goal:CFG.debtMom,c:'var(--red)',bg:'var(--red-lt)'},
    {name:'Ремонт. фонд',icon:'ti-tool',acc:totalRepair,goal:CFG.goalRepair,c:'#BF360C',bg:'var(--yellow-lt)'},
    {name:'Подушка безопасности',icon:'ti-building-bank',acc:totalPillow,goal:CFG.goalPillow,c:'var(--blue)',bg:'var(--blue-lt)'},
    {name:'Новая машина',icon:'ti-car',acc:totalCar,goal:CFG.goalCar,c:'var(--purple)',bg:'var(--purple-lt)'},
  ];

  const el=document.createElement('div');
  el.style.cssText='display:flex;flex-direction:column;gap:10px;width:100%';

  let dreamHtml='';
  if(dream&&!dream.done){
    dreamHtml=`<div class="card dream">
      <div class="lbl w">Когда куплю машину?</div>
      <div class="big w">через ${dream.monthsLeft} ${pluralM(dream.monthsLeft)}</div>
      <div class="sub w">${dream.label} · при текущем темпе</div>
    </div>`;
  } else if(dream&&dream.done){
    dreamHtml=`<div class="card dream"><div class="lbl w">Мечта достигнута!</div><div class="big w">Поздравляем!</div></div>`;
  }

  el.innerHTML=`
    <div class="card green">
      <div class="lbl">Мои деньги · последняя смена</div>
      <div class="big">${mineVal}</div>
      <div class="sub">${mineSub}</div>
    </div>
    ${dreamHtml}
    ${transfers.length?`
    <div class="sec">Перевести сегодня</div>
    <div class="tlist">${transfers.map(t=>`
      <div class="trow">
        <div class="trow-l"><div class="tico" style="background:${t.bg}"><span class="ico" style="font-size:14px;color:${t.c}">${getIcon(t.icon)}</span></div>${t.l}</div>
        <div class="trow-r" style="color:${t.c}">${t.v>0?fmt(t.v):'—'}</div>
      </div>`).join('')}</div>`:''}
    <div class="sec">Статус дня</div>
    <div class="status"><div class="sdot" style="background:${sc}"></div><div class="stxt" style="color:${sc}">${emoji} ${st}</div></div>
    <div class="sec">Смены месяца</div>
    <div class="met" style="background:var(--bg);border:2px solid ${avgDayColor};border-radius:var(--r);padding:12px 16px;margin-bottom:0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="met-l">Средний доход в день</div>
          <div style="font-size:22px;font-weight:700;color:${avgDayColor};margin-top:2px">${fmt(avgPerDay)}</div>
        </div>
        <div style="text-align:right">
          <div class="met-l">Ожидаемый доход за месяц</div>
          <div style="font-size:14px;font-weight:600;color:${avgDayColor};margin-top:2px">${fmt(projectedMonth)}</div>
        </div>
      </div>
    </div>
    <div class="g2">
      <div class="met"><div class="met-l">Отработано</div><div class="met-v">${worked} из ${CFG.planShifts}</div></div>
      <div class="met"><div class="met-l">Осталось смен</div><div class="met-v">${Math.max(shiftsLeft,0)}</div></div>
      <div class="met"><div class="met-l">Доход за месяц</div><div class="met-v" style="font-size:14px">${fmt(monthNet)}</div></div>
      <div class="met"><div class="met-l">Цель месяца</div>
        <div class="met-v" style="color:${goalPct>=100?'var(--green)':'var(--text)'}">
          ${goalPct}%
          <div style="height:5px;background:var(--bg3);border-radius:3px;margin-top:5px;overflow:hidden">
            <div style="height:100%;width:${Math.min(goalPct,100)}%;background:var(--green);border-radius:3px"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="sec">Прогресс целей</div>
    <div class="prog-wrap">${goals.map(g=>{
      const pct=g.goal>0?Math.min(Math.round(g.acc/g.goal*100),100):0;
      const sl=avgNet>0?Math.ceil(Math.max(g.goal-g.acc,0)/avgNet):null;
      return`<div>
        <div class="pi-hd"><div class="pi-name"><span class="ico" style="color:${g.c}">${getIcon(g.icon)}</span>${g.name}</div><div class="pi-pct" style="color:${g.c}">${pct}%</div></div>
        <div class="pbar" style="background:${g.bg}"><div class="pbar-fill" style="width:${pct}%;background:${g.c}"></div></div>
        <div class="pi-meta"><span>${fmt(g.acc)} из ${fmt(g.goal)}</span><span>${sl?'~'+sl+' смен':'—'}</span></div>
      </div>`;}).join('')}</div>
    <button class="add-btn" onclick="go('add')"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg></span>Добавить смену</button>
    <div style="height:4px"></div>
  `;
  c.appendChild(el);
}

function renderHistory(c){
  const shifts=loadShifts();
  const expenses=loadFundExpenses();
  const deposits=loadFundDeposits();
  const items=[
    ...shifts.map((s,i)=>({type:'shift',data:s,origIdx:i,date:s.date})),
    ...expenses.map((e,i)=>({type:'expense',data:e,origIdx:i,date:e.date})),
    ...deposits.map((d,i)=>({type:'deposit',data:d,origIdx:i,date:d.date}))
  ].sort((a,b)=>b.date.localeCompare(a.date));

  if(!items.length){
    c.innerHTML='<div class="empty"><span class="ico" style="font-size:40px;display:block;margin-bottom:10px;color:var(--text3)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l11 0"/><path d="M9 12l11 0"/><path d="M9 18l11 0"/><path d="M5 6l0 .01"/><path d="M5 12l0 .01"/><path d="M5 18l0 .01"/></svg></span>Нет записей</div>';

      const sRepair=s.repair||0;

      return`<div class="hcard">
        <div class="hcard-top">
          <div class="hcard-date">${fmtD(s.date)}</div>
          <div style="display:flex;align-items:center;gap:8px">

          </div>
        </div>
        <div class="hgrid">
          <span>Грязными: <b>${fmt(s.gross)}</b></span>
          <span>Чистыми: <b>${fmt(s.net||(s.gross-s.fuel-s.food))}</b></span>
          <span>Бензин: <b>${fmt(s.fuel)}</b></span>
          ${sMom>0?`<span>Маме: <b style="color:var(--red)">${fmt(sMom)}</b></span>`:''}
          ${sRepair>0?`<span>Ремфонд: <b style="color:#BF360C">${fmt(sRepair)}</b></span>`:''}
          ${sPillow>0?`<span>Подушка: <b style="color:var(--blue)">${fmt(sPillow)}</b></span>`:''}
        </div>
      </div>`;
    } else if(item.type==='expense'){
      const e=item.data;
      return`<div class="hcard expense">
        <div class="hcard-top">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="hcard-date">${fmtD(e.date)}</div>

          </div>
        </div>
        <div class="hgrid">

          ${e.note?`<span>Комментарий: <b>${e.note}</b></span>`:''}
        </div>
      </div>`;
    } else {
      const d=item.data;
      return`<div class="hcard" style="border-left:3px solid var(--green)">
        <div class="hcard-top">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="hcard-date">${fmtD(d.date)}</div>

          </div>

            <button class="del-btn" onclick="deleteFundDeposit(${item.origIdx})" title="Удалить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7l16 0"/><path d="M10 11l0 6"/><path d="M14 11l0 6"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/></svg></button>

          ${d.note?`<span>Комментарий: <b>${d.note}</b></span>`:''}
        </div>
      </div>`;
    }
  }).join('');
  c.appendChild(el);
}

function renderStats(c){
  const shifts=loadShifts();
  const fundExpenses=loadFundExpenses();
  const ym=statYear+'-'+String(statMonth+1).padStart(2,'0');
  const monthShifts=shifts.filter(s=>s.date.slice(0,7)===ym);
  const monthExp=fundExpenses.filter(e=>e.date.slice(0,7)===ym);

  const totalGross=monthShifts.reduce((a,s)=>a+s.gross,0);
  const totalFuel=monthShifts.reduce((a,s)=>a+s.fuel,0);
  const totalFood=monthShifts.reduce((a,s)=>a+s.food,0);
  const totalNet=monthShifts.reduce((a,s)=>a+(s.net||(s.gross-s.fuel-s.food)),0);
  const totalRepF=monthShifts.reduce((a,s)=>a+(s.repair||0),0);
  const totalPilF=monthShifts.reduce((a,s)=>a+(s.pillow||0),0);
  const totalCarF=monthShifts.reduce((a,s)=>a+(s.car||0),0);
  const totalMom=monthShifts.reduce((a,s)=>a+(s.mom||0),0);
  const totalMine=monthShifts.reduce((a,s)=>a+(s.net||(s.gross-s.fuel-s.food))-(s.mom||0)-(s.repair||0)-(s.pillow||0)-(s.car||0),0);
  const repExp=monthExp.filter(e=>e.fund==='repair').reduce((a,e)=>a+e.amount,0);
  const pilExp=monthExp.filter(e=>e.fund==='pillow').reduce((a,e)=>a+e.amount,0);
  const carExp=monthExp.filter(e=>e.fund==='car').reduce((a,e)=>a+e.amount,0);

  const mNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const mLabel=mNames[statMonth]+' '+statYear;
  const now=new Date();
  const isNow=ym===now.toISOString().slice(0,7);
  const canNext=!(statYear===now.getFullYear()&&statMonth===now.getMonth());

  // Records
  let bestShift=null;
  shifts.forEach(s=>{
    const mine=calc(s.gross,s.fuel,s.food).mine;
    if(!bestShift||mine>calc(bestShift.gross,bestShift.fuel,bestShift.food).mine)bestShift=s;
  });
  const monthNetMap={};
  shifts.forEach(s=>{const m=s.date.slice(0,7);if(!monthNetMap[m])monthNetMap[m]=0;monthNetMap[m]+=calc(s.gross,s.fuel,s.food).net;});
  const bestMonthEntry=Object.entries(monthNetMap).sort((a,b)=>b[1]-a[1])[0];
  const uniqueDates=[...new Set(shifts.map(s=>s.date))].sort();
  let maxStreak=uniqueDates.length>0?1:0,curStr=1;
  for(let i=1;i<uniqueDates.length;i++){
    const diff=(new Date(uniqueDates[i]+'T12:00:00')-new Date(uniqueDates[i-1]+'T12:00:00'))/86400000;
    if(diff===1){curStr++;maxStreak=Math.max(maxStreak,curStr);}else curStr=1;
  }

  const bestShiftVal=bestShift?calc(bestShift.gross,bestShift.fuel,bestShift.food).mine:0;
  const bestMonthVal=bestMonthEntry?bestMonthEntry[1]:0;
  const bestMonthLbl=bestMonthEntry?mNames[parseInt(bestMonthEntry[0].slice(5))-1]+' '+bestMonthEntry[0].slice(0,4):'—';

  const el=document.createElement('div');
  el.style.cssText='display:flex;flex-direction:column;gap:10px;width:100%';
  el.innerHTML=`
    <div class="stat-nav">
      <button onclick="statPrev()">‹</button>
      <span>${mLabel}${isNow?' · сейчас':''}</span>
      <button onclick="statNext()" style="opacity:${canNext?1:.3}">${canNext?'›':''}</button>
    </div>
    ${monthShifts.length===0?`<div class="empty" style="padding:32px 0">Нет смен за этот период</div>`:`
    <div class="sec">Доходы и расходы</div>
    <div class="stat-block">
      <div class="stat-row"><span class="stat-lbl">Смен отработано</span><span class="stat-val">${monthShifts.length}</span></div>
      <div class="stat-row"><span class="stat-lbl">Валовой доход</span><span class="stat-val">${fmt(totalGross)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Бензин</span><span class="stat-val r">−${fmt(totalFuel)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Еда</span><span class="stat-val r">−${fmt(totalFood)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Чистый доход</span><span class="stat-val g">${fmt(totalNet)}</span></div>
    </div>
    <div class="sec">Инвестировано</div>
    <div class="stat-block">
      <div class="stat-row"><span class="stat-lbl">Ремонтный фонд</span><span class="stat-val" style="color:#BF360C">+${fmt(totalRepF)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Подушка</span><span class="stat-val" style="color:var(--blue)">+${fmt(totalPilF)}</span></div>
      <div class="stat-row"><span class="stat-lbl">На машину</span><span class="stat-val" style="color:var(--purple)">+${fmt(totalCarF)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Маме</span><span class="stat-val" style="color:var(--red)">+${fmt(totalMom)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Мои деньги</span><span class="stat-val g">${fmt(totalMine)}</span></div>
    </div>
    ${(repExp+pilExp+carExp)>0?`
    <div class="sec">Расходы из фондов</div>
    <div class="stat-block">
      ${repExp>0?`<div class="stat-row"><span class="stat-lbl">Ремонтный фонд</span><span class="stat-val o">−${fmt(repExp)}</span></div>`:''}
      ${pilExp>0?`<div class="stat-row"><span class="stat-lbl">Подушка</span><span class="stat-val o">−${fmt(pilExp)}</span></div>`:''}
      ${carExp>0?`<div class="stat-row"><span class="stat-lbl">На машину</span><span class="stat-val o">−${fmt(carExp)}</span></div>`:''}
    </div>`:''}
    `}
    <div class="sec">Рекорды за всё время</div>
    <div class="rec-grid">
      <div class="rec-card"><div class="rec-v">${bestShift?fmt(bestShiftVal):'—'}</div><div class="rec-l">Лучшая смена</div></div>
      <div class="rec-card"><div class="rec-v">${bestMonthEntry?fmt(bestMonthVal):'—'}</div><div class="rec-l">Лучший месяц</div><div class="rec-l" style="margin-top:1px">${bestMonthLbl}</div></div>
      <div class="rec-card"><div class="rec-v">${maxStreak}</div><div class="rec-l">${maxStreak===1?'день подряд':maxStreak<5?'дня подряд':'дней подряд'}</div></div>
    </div>
    <div style="height:4px"></div>
  `;
  c.appendChild(el);
}

function statPrev(){statMonth--;if(statMonth<0){statMonth=11;statYear--;}render();}
function statNext(){
  const now=new Date();
  if(statYear===now.getFullYear()&&statMonth===now.getMonth())return;
  statMonth++;if(statMonth>11){statMonth=0;statYear++;}render();
}

function updPrev(){
  const g=+document.getElementById('fg').value||0;
  if(!g){document.getElementById('prev').style.display='none';return;}
  const x=calc(g,+document.getElementById('ff').value||0,+document.getElementById('fe').value||0);
  const netEl=document.getElementById('pi-net');if(netEl)netEl.textContent=fmt(x.net);
  const fi=document.getElementById('fi-mom');if(fi)fi.value=x.mom;
  const fr=document.getElementById('fi-rep');if(fr)fr.value=x.repair;
  const fp=document.getElementById('fi-pil');if(fp)fp.value=x.pillow;
  const fc=document.getElementById('fi-car');if(fc)fc.value=x.car;
  const hm=document.getElementById('pi-mom-hint');if(hm)hm.textContent=x.mom>0?'обяз. '+fmt(x.mom):'';
  const hr=document.getElementById('pi-rep-hint');if(hr)hr.textContent=x.repair>0?'обяз. '+fmt(x.repair):'';
  const hp=document.getElementById('pi-pil-hint');if(hp)hp.textContent=x.pillow>0?'обяз. '+fmt(x.pillow):'';
  const hc=document.getElementById('pi-car-hint');if(hc)hc.textContent=x.car>0?'обяз. '+fmt(x.car):'';
  updMine();
  document.getElementById('prev').style.display='block';
}
function updMine(){
  const g=+document.getElementById('fg').value||0;
  const net=g-(+document.getElementById('ff').value||0)-(+document.getElementById('fe').value||0);
  const mom=+((document.getElementById('fi-mom')||{}).value)||0;
  const rep=+((document.getElementById('fi-rep')||{}).value)||0;
  const pil=+((document.getElementById('fi-pil')||{}).value)||0;
  const car=+((document.getElementById('fi-car')||{}).value)||0;
  const mine=net-mom-rep-pil-car;
  const el=document.getElementById('pi-mine');
  if(el){el.textContent=fmt(mine)+' ₽';el.style.color=mine<0?'var(--red)':'var(--green)';}
}

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwV3fdiQ51dDM3-Frhl8RpgThf9PqjVSriPTxDKuQYOF_jFxp_TzKMvismof22qAvHF/exec';

function jsonpSend(params,onOk){
  const cb='_w'+Date.now();
  const s=document.createElement('script');
  window[cb]=function(d){delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);if(d&&d.ok&&onOk)onOk();};
  s.onerror=function(){delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);};
  s.src=SCRIPT_URL+'?'+params+'&callback='+cb;
  document.body.appendChild(s);
}

function saveShift(){
  const date=document.getElementById('fd').value;
  const gross=+document.getElementById('fg').value||0;
  if(!date||!gross){showToast('Укажи дату и выручку');return;}
  const fuel=+document.getElementById('ff').value||0;
  const food=+document.getElementById('fe').value||0;
  const net=gross-fuel-food;
  const mom=+((document.getElementById('fi-mom')||{}).value)||0;
  const repair=+((document.getElementById('fi-rep')||{}).value)||0;
  const pillow=+((document.getElementById('fi-pil')||{}).value)||0;
  const car=+((document.getElementById('fi-car')||{}).value)||0;
  const mine=net-mom-repair-pillow-car;
  const shift={date,gross,fuel,food,mom,repair,pillow,car,net,mine};
  const shifts=loadShifts();
  shifts.push(shift);
  saveShifts(shifts);
  go('dash');
  showToast('Сохраняю...');
  jsonpSend(new URLSearchParams({date,gross,fuel,food,mom,repair,pillow,car,net,mine}).toString(),()=>showToast('Смена сохранена ✓'));
}

function saveFundExpense(){
  const date=document.getElementById('ex-date').value;
  const fund=document.getElementById('ex-fund').value;
  const amount=+document.getElementById('ex-amount').value||0;
  const note=document.getElementById('ex-note').value.trim();
  if(!date||!amount){showToast('Укажи дату и сумму');return;}
  const exp={date,fund,amount,note};
  const expenses=loadFundExpenses();
  expenses.push(exp);
  saveFundExpenses(expenses);
  go('dash');
  showToast('Сохраняю...');
  jsonpSend(new URLSearchParams({action:'save_fund_expense',date,fund,amount,note}).toString(),()=>showToast('Расход сохранён ✓'));
}

function deleteShift(idx){
  if(!confirm('Удалить эту смену?'))return;
  const shifts=loadShifts();
  const shift=shifts[idx];
  shifts.splice(idx,1);
  saveShifts(shifts);
  jsonpSend(new URLSearchParams({action:'delete',date:shift.date,gross:shift.gross}).toString(),null);
  showToast('Смена удалена');
  render();
}

function saveFundDeposit(){
  const date=document.getElementById('dep-date').value;
  const fund=document.getElementById('dep-fund').value;
  const fromFund=document.getElementById('dep-from').value;
  const amount=+document.getElementById('dep-amount').value||0;

  if(!date||!amount){showToast('Укажи дату и сумму');return;}
  if(fromFund&&fromFund===fund){showToast('Выбери разные фонды');return;}
  const FUND_NAMES={mom:'Долг маме',repair:'Ремфонд',pillow:'Подушка',car:'На машину'};
  if(fromFund){
    const destName=FUND_NAMES[fund]||fund;
    const srcName=FUND_NAMES[fromFund]||fromFund;
    const expNote=note?note+' (Перевод → '+destName+')'  :'Перевод → '+destName;
    const depNote=note?note+' (Перевод из '+srcName+')':'Перевод из '+srcName;
    const expenses=loadFundExpenses();
    expenses.push({date,fund:fromFund,amount,note:expNote});
    saveFundExpenses(expenses);
    jsonpSend(new URLSearchParams({action:'save_fund_expense',date,fund:fromFund,amount,note:expNote}).toString(),null);
    const deposits=loadFundDeposits();
    deposits.push({date,fund,amount,note:depNote});
    saveFundDeposits(deposits);
    go('dash');
    showToast('Сохраняю...');
    jsonpSend(new URLSearchParams({action:'save_fund_deposit',date,fund,amount,note:depNote}).toString(),()=>showToast('Перевод '+srcName+' → '+destName+' ✓'));
  } else {
    const deposits=loadFundDeposits();
    deposits.push({date,fund,amount,note});
    saveFundDeposits(deposits);
    go('dash');
    showToast('Сохраняю...');
    jsonpSend(new URLSearchParams({action:'save_fund_deposit',date,fund,amount,note}).toString(),()=>showToast('Взнос сохранён ✓'));
  }
}

function deleteFundDeposit(idx){
  if(!confirm('Удалить этот взнос?'))return;
  const deposits=loadFundDeposits();
  const dep=deposits[idx];
  deposits.splice(idx,1);
  saveFundDeposits(deposits);
  jsonpSend(new URLSearchParams({action:'delete_fund_deposit',date:dep.date,fund:dep.fund,amount:dep.amount}).toString(),null);
  showToast('Взнос удалён');
  render();
}

function deleteFundExpense(idx){
  if(!confirm('Удалить этот расход?'))return;
  const expenses=loadFundExpenses();
  const exp=expenses[idx];
  expenses.splice(idx,1);
  saveFundExpenses(expenses);
  jsonpSend(new URLSearchParams({action:'delete_fund_expense',date:exp.date,fund:exp.fund,amount:exp.amount}).toString(),null);
  showToast('Расход удалён');
  render();
}

function saveCfgForm(){
  const n=id=>{const v=+document.getElementById(id).value;return isNaN(v)?0:v;};
  CFG.debtMom=n('s-debt');
  CFG.goalMonth=n('s-gmon')||150000;
  CFG.planShifts=n('s-psh')||25;
  CFG.pctMom=n('s-pmom');
  CFG.pctRepair=n('s-prep');
  CFG.pctPillow=n('s-ppil');
  CFG.pctCar=n('s-pcar');
  CFG.goalRepair=n('s-grep');
  CFG.goalPillow=n('s-gpil');
  CFG.goalCar=n('s-gcar');
  CFG.initRepair=n('s-irep');
  CFG.initPillow=n('s-ipil');
  CFG.initCar=n('s-icar');
  CFG.initMom=n('s-imom');
  saveCfg();
  syncCfgToSheets();
  showToast('Настройки сохранены');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function loadCfgFromSheets(){
  const cbName='_cfg'+Date.now();
  const s=document.createElement('script');
  window[cbName]=function(data){
    if(data&&typeof data==='object'){
      const knownKeys=Object.keys(DEF_CFG);
      const valid={};
      knownKeys.forEach(k=>{if(k in data&&typeof data[k]==='number')valid[k]=data[k];});
      if(Object.keys(valid).length>0){CFG=Object.assign({},CFG,valid);saveCfg();render();}
    }
    delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);
  };
  s.onerror=function(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);};
  s.src=SCRIPT_URL+'?action=get_settings&callback='+cbName;
  document.body.appendChild(s);
}

function syncCfgToSheets(){
  const params=new URLSearchParams({action:'save_settings',debtMom:CFG.debtMom,goalMonth:CFG.goalMonth,planShifts:CFG.planShifts,pctRepair:CFG.pctRepair,pctPillow:CFG.pctPillow,pctCar:CFG.pctCar,goalRepair:CFG.goalRepair,goalPillow:CFG.goalPillow,goalCar:CFG.goalCar,initRepair:CFG.initRepair||0,initPillow:CFG.initPillow||0,initCar:CFG.initCar||0,initMom:CFG.initMom||0,pctMom:CFG.pctMom||0}).toString();
  jsonpSend(params,null);
}

function loadShiftsFromSheets(){
  const cbName='_shifts'+Date.now();
  const s=document.createElement('script');
  window[cbName]=function(data){
    if(Array.isArray(data)&&data.length>0){
      data.forEach(s=>{const n=s.net||(s.gross-s.fuel-s.food);s.mine=n-(s.mom||0)-(s.repair||0)-(s.pillow||0)-(s.car||0);});
      saveShifts(data);render();
    }
    delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);
  };
  s.onerror=function(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);};
  s.src=SCRIPT_URL+'?action=get_shifts&callback='+cbName;
  document.body.appendChild(s);
}

function loadFundExpensesFromSheets(){
  const cbName='_exp'+Date.now();
  const s=document.createElement('script');
  window[cbName]=function(data){
    if(Array.isArray(data)&&data.length>0){saveFundExpenses(data);render();}
    delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);
  };
  s.onerror=function(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);};
  s.src=SCRIPT_URL+'?action=get_fund_expenses&callback='+cbName;
  document.body.appendChild(s);
}

function loadFundDepositsFromSheets(){
  const cbName='_dep'+Date.now();
  const s=document.createElement('script');
  window[cbName]=function(data){
    if(Array.isArray(data)&&data.length>0){saveFundDeposits(data);render();}
    delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);
  };
  s.onerror=function(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);};
  s.src=SCRIPT_URL+'?action=get_fund_deposits&callback='+cbName;
  document.body.appendChild(s);
}

render();
loadCfgFromSheets();
loadShiftsFromSheets();
loadFundExpensesFromSheets();
loadFundDepositsFromSheets();
